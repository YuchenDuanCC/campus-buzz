<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Buzz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }
    h1, h2 {
      margin-bottom: 12px;
    }
    form, .result-section {
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      cursor: pointer;
    }
    .message {
      margin-top: 16px;
      font-weight: bold;
    }
    .result-card {
      background: #f6f6f6;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      border: 1px solid #ddd;
    }
    .result-item {
      margin-bottom: 10px;
    }
    .result-label {
      font-weight: bold;
      display: inline-block;
      min-width: 120px;
    }
    .status-approved {
      color: green;
      font-weight: bold;
    }
    .status-revision {
      color: #c27c00;
      font-weight: bold;
    }
    .status-incomplete {
      color: #c62828;
      font-weight: bold;
    }
    .status-pending {
      color: #1565c0;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Campus Buzz</h1>
  <p>Submit a campus event and check its processing result.</p>

  <h2>Submit Event</h2>
  <form id="submitForm">
    <label for="title">Title</label>
    <input type="text" id="title" >

    <label for="description">Description</label>
    <textarea id="description" rows="5" ></textarea>

    <label for="location">Location</label>
    <input type="text" id="location" >

    <label for="date">Date (YYYY-MM-DD)</label>
    <input type="text" id="date" >

    <label for="organiser">Organiser</label>
    <input type="text" id="organiser" >

    <button type="submit">Submit</button>
    <div class="message" id="submitResult"></div>
  </form>

  <div class="result-section">
    <h2>Check Result</h2>
    <label for="queryId">Submission ID</label>
    <input type="number" id="queryId">
    <button id="checkButton">Check Result</button>
    <div id="resultOutput" class="result-card" style="display: none;"></div>
  </div>

  <script>
    const API_BASE = "http://localhost:5001";

    document.getElementById("submitForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = {
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        location: document.getElementById("location").value,
        date: document.getElementById("date").value,
        organiser: document.getElementById("organiser").value
      };

      try {
        const response = await fetch(`${API_BASE}/submit`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (!response.ok) {
          document.getElementById("submitResult").innerText =
            "Submission failed: " + JSON.stringify(result);
          return;
        }

        document.getElementById("submitResult").innerText =
          `Submitted successfully. Submission ID = ${result.submission_id}`;

        document.getElementById("queryId").value = result.submission_id;
      } catch (error) {
        document.getElementById("submitResult").innerText =
          "Error: " + error.message;
      }
    });

    document.getElementById("checkButton").addEventListener("click", checkResult);

    async function checkResult() {
      const id = document.getElementById("queryId").value;
      const resultOutput = document.getElementById("resultOutput");

      if (!id) {
        resultOutput.style.display = "block";
        resultOutput.innerHTML = "Please enter a submission ID.";
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/result/${id}`);
        const result = await response.json();

        resultOutput.style.display = "block";

        if (!response.ok) {
          resultOutput.innerHTML = `Query failed: ${JSON.stringify(result)}`;
          return;
        }

        let statusClass = "status-pending";
        if (result.status === "APPROVED") {
          statusClass = "status-approved";
        } else if (result.status === "NEEDS REVISION") {
          statusClass = "status-revision";
        } else if (result.status === "INCOMPLETE") {
          statusClass = "status-incomplete";
        }

        resultOutput.innerHTML = `
          <div class="result-item"><span class="result-label">Submission ID:</span> ${result.id}</div>
          <div class="result-item"><span class="result-label">Title:</span> ${result.title}</div>
          <div class="result-item"><span class="result-label">Status:</span> <span class="${statusClass}">${result.status}</span></div>
          <div class="result-item"><span class="result-label">Category:</span> ${result.category || "Not assigned yet"}</div>
          <div class="result-item"><span class="result-label">Priority:</span> ${result.priority || "Not assigned yet"}</div>
          <div class="result-item"><span class="result-label">Note:</span> ${result.note || "No note available."}</div>
        `;
      } catch (error) {
        resultOutput.style.display = "block";
        resultOutput.innerHTML = "Error: " + error.message;
      }
    }
  </script>
</body>
</html>
