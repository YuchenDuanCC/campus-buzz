version: "3.9"

services:
  presentation-service:
    build: ./presentation-service
    container_name: presentation-service
    ports:
      - "8081:80"
    depends_on:
      - workflow-service

  workflow-service:
    build: ./workflow-service
    container_name: workflow-service
    ports:
      - "5001:5001"
    environment:
      - DATA_SERVICE_URL=http://data-service:5002
      - SUBMISSION_EVENT_URL=http://submission-event-function:5003/invoke
    depends_on:
      - data-service
      - submission-event-function
    command: uvicorn main:app --host 0.0.0.0 --port 5001

  data-service:
    build: ./data-service
    container_name: data-service
    ports:
      - "5002:5002"
    environment:
      - DB_PATH=/app/submissions.db
    command: uvicorn main:app --host 0.0.0.0 --port 5002

  submission-event-function:
    build: ./submission-event-function
    container_name: submission-event-function
    ports:
      - "5003:5003"
    environment:
      - DATA_SERVICE_URL=http://data-service:5002
      - PROCESSING_FUNCTION_URL=http://processing-function:5004/invoke
      - RESULT_UPDATE_FUNCTION_URL=http://result-update-function:5005/invoke
    depends_on:
      - data-service
      - processing-function
      - result-update-function
    command: uvicorn main:app --host 0.0.0.0 --port 5003

  processing-function:
    build: ./processing-function
    container_name: processing-function
    ports:
      - "5004:5004"
    command: uvicorn main:app --host 0.0.0.0 --port 5004

  result-update-function:
    build: ./result-update-function
    container_name: result-update-function
    ports:
      - "5005:5005"
    environment:
      - DATA_SERVICE_URL=http://data-service:5002
    depends_on:
      - data-service
    command: uvicorn main:app --host 0.0.0.0 --port 5005