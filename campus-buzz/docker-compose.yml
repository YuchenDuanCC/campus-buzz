services:
  data-service:
    build:
      context: ./data-service
    container_name: data-service
    ports:
      - "5002:5002"
    environment:
      - DB_PATH=submissions.db

  workflow-service:
    build:
      context: ./workflow-service
    container_name: workflow-service
    ports:
      - "5001:5001"
    environment:
      - DATA_SERVICE_URL=http://data-service:5002
    depends_on:
      - data-service

  presentation-service:
    build:
      context: ./presentation-service
    container_name: presentation-service
    ports:
      - "8081:80"
    depends_on:
      - workflow-service